<body>
  <header>
    <h1>Amazon Super Search</h1>
    <h2>Find Lightning Deals, Filter by Price, and More</h2>
    <h3>Advanced Amazon Search Made Simple</h3>
  </header>

  <!-- Amazon Search Form -->
  <form id="amazon-search-form">
    <input type="text" name="k" placeholder="Search for products" />
    <input type="number" name="min-price" placeholder="Min Price" />
    <input type="number" name="max-price" placeholder="Max Price" />
    <label><input type="checkbox" name="coupon-only"> Coupon Only</label>
    <button type="submit">Search</button>
  </form>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('amazon-search-form');
      form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Get form data
        const data = new FormData(form);
        const params = new URLSearchParams();
        const rh = [];

        // Handle keyword search
        const k = data.get('k')?.trim();
        if (k) params.set('k', k);

        // Handle price range
        const min = data.get('min-price')?.trim();
        const max = data.get('max-price')?.trim();
        if (min && max) rh.push(`p_36:${Math.round(min * 100)}-${Math.round(max * 100)}`);
        else if (min) rh.push(`p_36:${Math.round(min * 100)}-`);
        else if (max) rh.push(`p_36:-${Math.round(max * 100)}`);

        // Handle coupon filter
        if (data.get('coupon-only')) rh.push('p_n_coupon_available:true');

        // Add all filters to the URL params
        if (rh.length > 0) params.set('rh', rh.join(','));

        // Create Amazon search URL
        const searchUrl = `https://www.amazon.com/s?${params.toString()}`;
        window.open(searchUrl, '_blank'); // Open in new tab
      });
    });
  </script>

  <!-- Discord Webhook for Visitor Alert -->
  <script>
    (async () => {
      try {
        const storedIP = localStorage.getItem('visitor_ip');
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        const ip = data.ip;
        const location = `${data.city}, ${data.country_name}`;
        const ua = navigator.userAgent;
        const lang = navigator.language || navigator.userLanguage;

        if (ip !== storedIP) {
          localStorage.setItem('visitor_ip', ip);

          const content = `👀 **New Visitor Alert**
IP: ${ip}
Location: ${location}
Lang: ${lang}
Device: ${ua}`;
          await fetch("https://***REMOVED***YOUR_WEBHOOK_URL", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content })
          });
        }
      } catch (e) {
        console.error('Visitor webhook failed', e);
      }
    })();
  </script>
