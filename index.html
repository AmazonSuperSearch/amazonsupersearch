<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-51QSZ395GS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-51QSZ395GS');
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amazon Super Search – Filter Lightning Deals & Price Trends</title>
  <link rel="icon" type="image/png" href="/favicon.png" sizes="48x48">
  <link rel="manifest" href="/site.webmanifest">

  <!-- SEO Meta Tags -->
  <meta name="description" content="Amazon Super Search helps you find the best Amazon deals using price filters, brand include/exclude, coupons, Prime-only options, and advanced search tools.">
  <meta name="keywords" content="Amazon search filter, in-stock Amazon deals, Amazon price tracker, Amazon coupon finder, Amazon Prime filter, Amazon sort by rating, search Amazon by brand, exclude brands on Amazon, advanced Amazon search tool, Amazon deal finder, Amazon lightning deals tracker, Amazon filter tool, Amazon price trend filters">
  <meta name="robots" content="index, follow">

  <!-- Bootstrap CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.min.js"></script>

  <style>
    /* Custom Styles */
    @keyframes text-pulse {
      0% { text-shadow: 0 0 5px rgba(255,153,0,0.7), 0 0 10px rgba(255,153,0,0.5); }
      50% { text-shadow: 0 0 20px rgba(255,153,0,0.9), 0 0 30px rgba(255,153,0,0.7); }
      100% { text-shadow: 0 0 5px rgba(255,153,0,0.7), 0 0 10px rgba(255,153,0,0.5); }
    }

    .text-pulse { color: #FF9900; animation: text-pulse 2s infinite ease-in-out; }
    .card, .accordion-item { border: 3px solid #007bff; border-radius: .75rem; box-shadow: 0 4px 12px rgba(0,123,255,0.15); padding: 1rem; margin-bottom: 1.5rem; background-color: #fff; }
    .form-control, .form-select { border: 3px solid #000 !important; border-radius: 4px !important; }
  </style>

</head>
<body>
  <header>
    <h1 class="text-center">Amazon Super Search</h1>
    <h2 class="text-center">Find Lightning Deals, Filter by Price, and More</h2>
  </header>

  <form id="amazon-search-form" class="container mt-5">
    <!-- Step 1: Search Input -->
    <div class="mb-3">
      <label for="searchQuery" class="form-label">What are you shopping for?</label>
      <input type="text" class="form-control" id="searchQuery" name="q" placeholder="e.g. wireless headphones">
    </div>

    <!-- Step 2: Price Range -->
    <div class="mb-3">
      <label for="minPrice" class="form-label">Price Range</label>
      <div class="d-flex">
        <input type="number" class="form-control" id="minPrice" name="min-price" placeholder="Min">
        <input type="number" class="form-control ms-2" id="maxPrice" name="max-price" placeholder="Max">
      </div>
    </div>

    <!-- Step 3: Brand Filters -->
    <div class="mb-3">
      <label for="brandInclude" class="form-label">Include Brands</label>
      <input type="text" class="form-control" id="brandInclude" name="brand-include" placeholder="e.g. Sony, LG">
    </div>

    <div class="mb-3">
      <label for="brandExclude" class="form-label">Exclude Brands</label>
      <input type="text" class="form-control" id="brandExclude" name="brand-exclude" placeholder="e.g. Acer, Apple">
    </div>

    <!-- Step 4: Filters -->
    <div class="mb-3">
      <label class="form-check-label">Filter By:</label>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="prime-only" id="primeOnly">
        <label class="form-check-label" for="primeOnly">Prime Only</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="free-shipping" id="freeShipping">
        <label class="form-check-label" for="freeShipping">Free Shipping</label>
      </div>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary w-100">Search Amazon</button>
  </form>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('amazon-search-form');
      
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const data = new FormData(form);
        const params = new URLSearchParams();

        // Add search query
        const searchQuery = data.get('q').trim();
        if (searchQuery) params.set('k', searchQuery);

        // Add price range
        const minPrice = data.get('min-price').trim();
        const maxPrice = data.get('max-price').trim();
        if (minPrice || maxPrice) {
          params.set('p_36', `${minPrice}-${maxPrice}`);
        }

        // Add brand filters
        const brandInclude = data.get('brand-include').trim();
        if (brandInclude) params.set('p_89', brandInclude);

        const brandExclude = data.get('brand-exclude').trim();
        if (brandExclude) params.set('p_n_brand-exclude', brandExclude);

        // Add checkbox filters
        if (data.get('prime-only')) params.set('p_n_prime-only', 'true');
        if (data.get('free-shipping')) params.set('p_n_free-shipping', 'true');
        
        // Final URL construction
        const amazonUrl = `https://www.amazon.com/s?${params.toString()}`;
        window.open(amazonUrl, '_blank');
      });
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
